# Serum substitutes, defined supplements, and food-grade / sustainable
# alternatives (albumin replacements, ITS, hydrolysates, extracts). These are
# central to serum-free and cost-reduction routes.
- canonical: FBS
  aliases: ["fetal bovine serum", "fetal calf serum", "FCS", "serum"]
  category: serum
  notes: "Undefined, lot-variable mixture; serum reduction/removal is a core objective."
- canonical: recombinant-albumin
  aliases: ["recombinant albumin", "recombinant human albumin", "rHSA", "rHA", "recombinant serum albumin", "Albumin (recombinant)"]
  category: albumin_substitute
  notes: "Single-component addition that adapts B8 into Beefy-9 for bovine satellite cells."
- canonical: BSA
  aliases: ["bovine serum albumin"]
  category: albumin_substitute
- canonical: ITS
  aliases: ["insulin-transferrin-selenium", "ITS-G", "ITS premix", "insulin transferrin selenium"]
  category: defined_supplement
- canonical: sodium-selenite
  aliases: ["selenium", "selenite", "sodium selenite", "Na2SeO3"]
  category: trace_element
- canonical: copper-ions
  aliases: ["copper ions", "Cu2+", "Cu(II)", "copper ion", "Cu ions"]
  category: trace_element
  notes: "Gu et al. 2025 review reports copper ions at 5 uM as a cultivated-meat proliferation-related cue; human review required before wet-lab use."
- canonical: soy-protein-hydrolysate
  aliases: ["soy hydrolysate", "soy peptone", "hydrolyzed soy protein"]
  category: hydrolysate
  notes: "Food-grade proliferation-promoting candidate; strong fit for food-nutrition angle."
- canonical: pea-protein-hydrolysate
  aliases: ["pea hydrolysate", "pea peptone"]
  category: hydrolysate
- canonical: yeast-extract
  aliases: ["yeast hydrolysate", "yeast peptone", "yeast extract"]
  category: hydrolysate
- canonical: rice-protein-hydrolysate
  aliases: ["rice hydrolysate", "grain-derived hydrolysate"]
  category: hydrolysate
- canonical: algae-extract
  aliases: ["algal extract", "microalgae extract", "Chlorella extract", "spirulina extract"]
  category: extract
- canonical: Auxenochlorella-pyrenoidosa-protein-extract
  aliases: ["Auxenochlorella pyrenoidosa protein extract", "Auxenochlorella pyrenoidosa extract", "APE", "A. pyrenoidosa protein extract"]
  category: extract
  notes: "Dong et al. 2024 JAFC reports APE as a low-serum FBS-replacement candidate in fish muscle cells; weak cross-species prior only."
- canonical: Grifola-frondosa-extract
  aliases: ["Grifola frondosa extract", "GFE", "maitake extract", "GF extract"]
  category: extract
  notes: "Yu et al. 2024 Food Research International reports 0.78-12.5 ug/mL GFE under low serum for Hanwoo satellite cells; DOI 10.1016/j.foodres.2024.115173."
- canonical: rapeseed-protein-isolate
  aliases: ["rapeseed protein isolate", "rapeseed protein isolates", "RPI", "rapeseed isolate"]
  category: albumin_substitute
  notes: "Albumin-replacement axis in Beefy-R; Biomaterials 2023, DOI 10.1016/j.biomaterials.2023.122092."
- canonical: L-glutamine
  aliases: ["glutamine", "GlutaMAX", "L-alanyl-L-glutamine", "Ala-Gln"]
  category: amino_acid
- canonical: glucose
  aliases: ["D-glucose", "dextrose"]
  category: carbon_source
- canonical: horse-serum
  aliases: ["horse serum", "equine serum"]
  category: serum
  notes: "Animal serum used mainly in differentiation media; animal-derived, so outside the animal-component-free target but recorded for evidence completeness."
- canonical: sodium-pyruvate
  aliases: ["sodium pyruvate", "pyruvate"]
  category: energy_substrate
- canonical: linoleic-acid
  aliases: ["linoleic acid"]
  category: lipid
  notes: "Fatty-acid supplement; among factors reported to improve bovine satellite-cell proliferation in B8-derived media (often paired with oleic acid)."
- canonical: fetuin
  aliases: ["fetuin-A", "fetuin A", "alpha-2-HS-glycoprotein"]
  category: serum_protein
